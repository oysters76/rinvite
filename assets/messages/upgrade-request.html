<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#faf8f5;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf8f5;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                 style="max-width:480px;background:#ffffff;border-radius:12px;overflow:hidden;font-family:Georgia,'Times New Roman',serif;color:#2b2b2b;">
            <tr>
              <td style="padding:32px 40px 8px;">
                <h1 style="margin:0;font-size:22px;color:#7a5c2e;">Plan upgrade request</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 40px 24px;font-size:16px;line-height:1.6;">
                <p style="margin:0 0 16px;">A Rinvite user has requested a plan upgrade.</p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="font-size:15px;">
                  <tr>
                    <td style="padding:2px 12px 2px 0;color:#8a8a8a;">User</td>
                    <td style="padding:2px 0;"><strong>{user_email}</strong></td>
                  </tr>
                  <tr>
                    <td style="padding:2px 12px 2px 0;color:#8a8a8a;">Current plan</td>
                    <td style="padding:2px 0;">{current_plan}</td>
                  </tr>
                  <tr>
                    <td style="padding:2px 12px 2px 0;color:#8a8a8a;">Requested at</td>
                    <td style="padding:2px 0;">{requested_at}</td>
                  </tr>
                </table>
                <p style="margin:24px 0 0;font-size:13px;color:#8a8a8a;">
                  Reach out to arrange the upgrade, then update their plan in the database.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
