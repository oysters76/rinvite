<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#faf8f5;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf8f5;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                 style="max-width:480px;background:#ffffff;border-radius:12px;overflow:hidden;font-family:Georgia,'Times New Roman',serif;color:#2b2b2b;">
            <tr>
              <td style="padding:32px 40px 8px;">
                <h1 style="margin:0;font-size:24px;color:#7a5c2e;">Welcome to Rinvite</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 40px 24px;font-size:16px;line-height:1.6;">
                <p style="margin:0 0 16px;">
                  Please confirm this email address (<strong>{email}</strong>) to activate
                  your account.
                </p>
                <p style="margin:0 0 24px;">
                  <a href="{verify_url}"
                     style="display:inline-block;background:#7a5c2e;color:#ffffff;text-decoration:none;padding:12px 24px;border-radius:8px;font-size:16px;">
                    Verify email
                  </a>
                </p>
                <p style="margin:0;font-size:13px;color:#8a8a8a;">
                  This link expires in 24 hours. If you didn't create a Rinvite account,
                  you can safely ignore this message.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
