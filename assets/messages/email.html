<!doctype html>
<html>
	<body
		style="margin: 0; background: #f3f2f2; font-family: Georgia, 'Times New Roman', serif; color: #201e1d;"
	>
		<table width="100%" cellpadding="0" cellspacing="0" role="presentation">
			<tr>
				<td align="center" style="padding: 32px 16px;">
					<table
						width="480"
						cellpadding="0"
						cellspacing="0"
						role="presentation"
						style="max-width: 480px; background: #ffffff; border: 1px solid #e7ddd0;"
					>
						<tr>
							<td style="padding: 36px 32px; text-align: center;">
								<p
									style="letter-spacing: 0.2em; text-transform: uppercase; font-size: 12px; color: #b38728; margin: 0 0 12px;"
								>
									You are invited
								</p>
								<h1 style="font-size: 28px; margin: 0 0 8px; font-weight: normal;">{couple}</h1>
								<p style="color: #6b5d45; margin: 0 0 24px;">
									Dear {guest_name}, we would be honoured by your presence.
								</p>
								<p style="margin: 0 0 4px;"><strong>{date}</strong></p>
								<p style="margin: 0 0 4px;">{time}</p>
								<p style="margin: 0 0 28px; color: #6b5d45;">{hall}, {venue}</p>
								{poruwa_html}
								<a
									href="{invite_url}"
									style="display: inline-block; background: #b38728; color: #ffffff; text-decoration: none; padding: 14px 34px; letter-spacing: 0.1em; text-transform: uppercase; font-size: 13px;"
									>View your invitation</a
								>
								<p style="margin: 28px 0 0; color: #8a7a63; font-size: 13px;">
									Kindly RSVP by {rsvp_by}
								</p>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
